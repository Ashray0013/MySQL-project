<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Profile - Smart Campus</title>
    <style>
        /* Keep all your existing styles - they're fine */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: auto;
        }

        /* Navigation */
        .navbar {
            background: white;
            border-radius: 15px;
            padding: 15px 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
        }

        .nav-links {
            display: flex;
            gap: 15px;
        }

        .nav-link {
            padding: 8px 20px;
            border-radius: 20px;
            text-decoration: none;
            color: #666;
            transition: 0.3s;
            font-weight: 500;
        }

        .nav-link:hover {
            background: #f0f2f5;
            color: #667eea;
        }

        .nav-link.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .logout-btn {
            background: #ff4757;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: 500;
        }

        .logout-btn:hover {
            background: #ff6b81;
            transform: translateY(-2px);
        }

        /* Profile Card */
        .profile-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            overflow: hidden;
            margin-bottom: 25px;
        }

        .profile-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px;
            color: white;
            position: relative;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 20px;
            border: 4px solid rgba(255,255,255,0.3);
        }

        .profile-name {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .profile-badge {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 14px;
            margin-right: 10px;
            backdrop-filter: blur(5px);
        }

        .edit-profile-btn {
            position: absolute;
            top: 40px;
            right: 40px;
            background: white;
            color: #667eea;
            border: none;
            padding: 12px 25px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .edit-profile-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }

        .profile-content {
            padding: 40px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .info-item {
            padding: 15px;
            background: #f8f9fa;
            border-radius: 12px;
        }

        .info-label {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }

        .info-value {
            font-size: 16px;
            font-weight: 600;
            color: #2c3e50;
        }

        .social-links {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .social-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: #f0f2f5;
            border-radius: 30px;
            text-decoration: none;
            color: #333;
            transition: 0.3s;
        }

        .social-link:hover {
            background: #e1e4e8;
            transform: translateY(-2px);
        }

        .social-link.linkedin:hover {
            background: #0077b5;
            color: white;
        }

        .social-link.github:hover {
            background: #333;
            color: white;
        }

        .section {
            margin-top: 40px;
        }

        .section-title {
            font-size: 22px;
            color: #2c3e50;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f2f5;
        }

        .clubs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .club-card {
            background: linear-gradient(135deg, #667eea10, #764ba210);
            border: 1px solid #667eea20;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            transition: 0.3s;
            cursor: pointer;
        }

        .club-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.2);
            background: linear-gradient(135deg, #667eea20, #764ba220);
        }

        .club-icon {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .club-name {
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 5px;
        }

        .club-position {
            font-size: 12px;
            color: #667eea;
            font-weight: 500;
        }

        .events-timeline {
            position: relative;
        }

        .event-item {
            background: white;
            border: 1px solid #eef2f6;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: 0.3s;
            cursor: pointer;
        }

        .event-item:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.1);
            border-left: 4px solid #667eea;
        }

        .event-date {
            min-width: 80px;
            text-align: center;
            padding: 10px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-radius: 10px;
        }

        .event-day {
            font-size: 24px;
            font-weight: 700;
            line-height: 1;
        }

        .event-month {
            font-size: 12px;
            text-transform: uppercase;
        }

        .event-details {
            flex: 1;
        }

        .event-title {
            font-size: 18px;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 5px;
        }

        .event-organizer {
            font-size: 13px;
            color: #667eea;
            font-weight: 500;
            margin-bottom: 5px;
        }

        .event-venue {
            font-size: 13px;
            color: #666;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .event-status {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-upcoming {
            background: #e6f4ea;
            color: #1e8e3e;
        }

        .status-past {
            background: #f1f3f4;
            color: #666;
        }

        /* Edit Profile Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background-color: white;
            margin: 5% auto;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            position: relative;
            animation: slideIn 0.3s;
            max-height: 80vh;
            overflow-y: auto;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .close-modal {
            position: absolute;
            right: 25px;
            top: 20px;
            font-size: 28px;
            font-weight: bold;
            color: #999;
            cursor: pointer;
            transition: 0.3s;
        }

        .close-modal:hover {
            color: #333;
            transform: rotate(90deg);
        }

        .modal-title {
            color: #2c3e50;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f2f5;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #eef2f6;
            border-radius: 10px;
            font-size: 14px;
            transition: 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }

        .save-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            width: 100%;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .save-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        /* Notifications */
        .success-message,
        .error-message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            z-index: 2000;
            animation: slideIn 0.3s;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
            background: #f8f9fa;
            border-radius: 12px;
        }

        .empty-state i {
            font-size: 48px;
            margin-bottom: 10px;
            opacity: 0.3;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .profile-header {
                padding: 30px;
            }

            .profile-name {
                font-size: 28px;
            }

            .edit-profile-btn {
                position: static;
                margin-top: 20px;
                width: fit-content;
            }

            .event-item {
                flex-direction: column;
                align-items: flex-start;
            }

            .event-date {
                width: 100%;
            }

            .navbar {
                flex-direction: column;
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Navigation -->
        <div class="navbar">
            <div class="logo" onclick="window.location.href='dashboard.html'">🎓 Smart Campus Hub</div>
            <div class="nav-links">
                <a href="dashboard.html" class="nav-link">Dashboard</a>
                <a href="profile.html" class="nav-link active">Profile</a>
            </div>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>

        <!-- Profile Card -->
        <div class="profile-card">
            <div class="profile-header">
                <div class="profile-avatar" id="userAvatar"></div>
                <h1 class="profile-name" id="userName">Loading...</h1>
                <div>
                    <span class="profile-badge" id="userRoll"></span>
                    <span class="profile-badge" id="userDept"></span>
                </div>
                
                <button class="edit-profile-btn" onclick="openEditModal()">
                    <span>✏️</span> Edit Profile
                </button>
            </div>

            <div class="profile-content">
                <!-- Bio -->
                <div class="info-item" style="margin-bottom: 30px;">
                    <div class="info-label">About Me</div>
                    <div class="info-value" id="userBio">Loading...</div>
                </div>

                <!-- Contact Info Grid -->
                <div class="info-grid">
                    <div class="info-item">
                        <div class="info-label">Email</div>
                        <div class="info-value" id="userEmail">Loading...</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Member Since</div>
                        <div class="info-value" id="userMemberSince">Loading...</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Total Events</div>
                        <div class="info-value" id="userEventCount">0</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Club Memberships</div>
                        <div class="info-value" id="userClubCount">0</div>
                    </div>
                </div>

                <!-- Social Links -->
                <div class="social-links" id="socialLinks">
                    <a id="link-linkedin" href="#" target="_blank" class="social-link linkedin">
                        <span>💼</span> LinkedIn
                    </a>
                    <a id="link-github" href="#" target="_blank" class="social-link github">
                        <span>🐙</span> GitHub
                    </a>
                </div>

                <!-- My Clubs Section -->
                <div class="section">
                    <h2 class="section-title">
                        <span>🎯</span> My Club Memberships
                    </h2>
                    <div id="club-list" class="clubs-grid">
                        <div class="loading">Loading clubs...</div>
                    </div>
                </div>

                <!-- Events Section -->
                <div class="section">
                    <h2 class="section-title">
                        <span>📅</span> My Events
                    </h2>
                    <div id="event-list" class="events-timeline">
                        <div class="loading">Loading events...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Profile Modal -->
    <div id="editProfileModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeEditModal()">&times;</span>
            <h2 class="modal-title">Edit Profile</h2>
            
            <form id="editProfileForm" onsubmit="updateProfile(event)">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" id="editFirstName" required>
                </div>

                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" id="editLastName" required>
                </div>

                <div class="form-group">
                    <label>Branch/Department</label>
                    <input type="text" id="editBranch" required>
                </div>

                <div class="form-group">
                    <label>LinkedIn URL</label>
                    <input type="url" id="editLinkedin" placeholder="https://linkedin.com/in/username">
                </div>

                <div class="form-group">
                    <label>GitHub URL</label>
                    <input type="url" id="editGithub" placeholder="https://github.com/username">
                </div>

                <div class="form-group">
                    <label>Bio</label>
                    <textarea id="editBio" placeholder="Tell us about yourself..."></textarea>
                </div>

                <button type="submit" class="save-btn">Save Changes</button>
            </form>
        </div>
    </div>

    <!-- Event Details Modal -->
    <div id="eventDetailsModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeEventModal()">&times;</span>
            <h2 class="modal-title" id="eventModalTitle">Event Details</h2>
            <div id="eventModalContent" class="modal-body">
                Loading...
            </div>
        </div>
    </div>

    <script>
        // Configuration
        const API_BASE_URL = 'http://localhost:3000/api';
        let currentUserId = localStorage.getItem('userId');
        let currentUser = null;

        // Check authentication
        if (!currentUserId) {
            window.location.href = 'login.html';
        }

        // Notification function
        function showNotification(message, type = 'success') {
            const notification = document.createElement('div');
            notification.className = type === 'success' ? 'success-message' : 'error-message';
            notification.textContent = message;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.remove();
            }, 3000);
        }

        // Logout function
        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }

        // Modal functions
        function openEditModal() {
            // Populate form with current data
            if (currentUser) {
                document.getElementById('editFirstName').value = currentUser.first_name || '';
                document.getElementById('editLastName').value = currentUser.last_name || '';
                document.getElementById('editBranch').value = currentUser.branch_dept || '';
                document.getElementById('editLinkedin').value = currentUser.linkedin_url || '';
                document.getElementById('editGithub').value = currentUser.github_url || '';
                document.getElementById('editBio').value = currentUser.bio || '';
            }
            
            document.getElementById('editProfileModal').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closeEditModal() {
            document.getElementById('editProfileModal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function openEventModal() {
            document.getElementById('eventDetailsModal').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closeEventModal() {
            document.getElementById('eventDetailsModal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            if (event.target.classList.contains('modal')) {
                event.target.style.display = 'none';
                document.body.style.overflow = 'auto';
            }
        };

        // Update profile
        async function updateProfile(event) {
            event.preventDefault();

            const updatedData = {
                first_name: document.getElementById('editFirstName').value,
                last_name: document.getElementById('editLastName').value,
                branch_dept: document.getElementById('editBranch').value,
                linkedin_url: document.getElementById('editLinkedin').value || null,
                github_url: document.getElementById('editGithub').value || null,
                bio: document.getElementById('editBio').value || null
            };

            try {
                const response = await fetch(`${API_BASE_URL}/profile/${currentUserId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(updatedData)
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Failed to update profile');
                }

                showNotification('Profile updated successfully!');
                closeEditModal();
                
                // Reload profile data
                await loadProfile();

            } catch (error) {
                console.error('Error updating profile:', error);
                showNotification(error.message || 'Failed to update profile', 'error');
            }
        }

        // Show event details
        async function showEventDetails(eventId) {
            try {
                const response = await fetch(`${API_BASE_URL}/events/${eventId}`);

                if (!response.ok) throw new Error('Failed to load event details');

                const event = await response.json();

                document.getElementById('eventModalTitle').textContent = event.title;

                const content = `
                    <div>
                        <p style="line-height: 1.6; margin-bottom: 20px;">${event.about_event || 'No description available.'}</p>
                        
                        <div style="background: #f8f9fa; padding: 15px; border-radius: 10px; margin-bottom: 20px;">
                            <div style="margin-bottom: 8px;"><strong>📅 Date:</strong> ${new Date(event.date_time).toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}</div>
                            <div style="margin-bottom: 8px;"><strong>⏰ Time:</strong> ${new Date(event.date_time).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' })}</div>
                            <div style="margin-bottom: 8px;"><strong>📍 Venue:</strong> ${event.venue || 'TBA'}</div>
                            <div><strong>🎪 Organized by:</strong> ${event.club_name || event.fest_name || 'Campus'}</div>
                        </div>

                        <button class="save-btn" onclick="registerForEvent(${event.event_id})">
                            Register for this event
                        </button>
                    </div>
                `;

                document.getElementById('eventModalContent').innerHTML = content;
                openEventModal();

            } catch (error) {
                console.error('Error loading event details:', error);
                showNotification('Failed to load event details', 'error');
            }
        }

        // Register for event
        async function registerForEvent(eventId) {
            try {
                const response = await fetch(`${API_BASE_URL}/events/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        userId: parseInt(currentUserId),
                        eventId: parseInt(eventId)
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Failed to register');
                }

                showNotification('Successfully registered for the event!');
                closeEventModal();

            } catch (error) {
                console.error('Error registering:', error);
                showNotification(error.message || 'Failed to register for event', 'error');
            }
        }

        // Load profile data
        async function loadProfile() {
            try {
                // Fetch profile data with memberships and events
                const response = await fetch(`${API_BASE_URL}/profile/${currentUserId}`);

                if (response.status === 401 || response.status === 403) {
                    logout();
                    return;
                }

                if (!response.ok) {
                    throw new Error('Failed to load profile');
                }

                currentUser = await response.json();

                // Update basic info
                document.getElementById('userName').textContent = `${currentUser.first_name || ''} ${currentUser.last_name || ''}`.trim() || 'User';
                document.getElementById('userRoll').textContent = currentUser.roll_no || 'Roll No';
                document.getElementById('userDept').textContent = currentUser.branch_dept || 'Department';
                document.getElementById('userBio').textContent = currentUser.bio || 'No bio provided.';
                document.getElementById('userEmail').textContent = currentUser.email || 'Email not available';
                
                // Set avatar
                const avatar = document.getElementById('userAvatar');
                if (currentUser.first_name) {
                    avatar.textContent = currentUser.first_name[0] + (currentUser.last_name ? currentUser.last_name[0] : '');
                } else {
                    avatar.textContent = '👤';
                }

                // Set social links
                const linkedin = document.getElementById('link-linkedin');
                const github = document.getElementById('link-github');

                if (currentUser.linkedin_url) {
                    linkedin.href = currentUser.linkedin_url;
                    linkedin.style.display = 'inline-flex';
                } else {
                    linkedin.style.display = 'none';
                }

                if (currentUser.github_url) {
                    github.href = currentUser.github_url;
                    github.style.display = 'inline-flex';
                } else {
                    github.style.display = 'none';
                }

                // Fetch user's memberships with details
                const membershipsResponse = await fetch(`${API_BASE_URL}/user-memberships-detailed/${currentUserId}`);

                if (membershipsResponse.ok) {
                    const memberships = await membershipsResponse.json();
                    
                    document.getElementById('userClubCount').textContent = memberships.length;

                    // Render clubs
                    const clubContainer = document.getElementById('club-list');
                    
                    if (memberships.length === 0) {
                        clubContainer.innerHTML = `
                            <div class="empty-state">
                                <div>🎯</div>
                                <p>You haven't joined any clubs yet.</p>
                                <p style="font-size: 14px; margin-top: 10px;">Explore clubs on the dashboard!</p>
                            </div>
                        `;
                    } else {
                        clubContainer.innerHTML = memberships.map(membership => `
                            <div class="club-card" onclick="window.location.href='club.html?id=${membership.club_id}'">
                                <div class="club-icon">${getClubIcon(membership.cname)}</div>
                                <div class="club-name">${membership.cname}</div>
                                <div class="club-position">${membership.position || 'Member'}</div>
                            </div>
                        `).join('');
                    }
                }

                // Fetch user's events
                const eventsResponse = await fetch(`${API_BASE_URL}/user-events/${currentUserId}`);

                if (eventsResponse.ok) {
                    const events = await eventsResponse.json();
                    
                    document.getElementById('userEventCount').textContent = events.length;

                    // Render events
                    const eventContainer = document.getElementById('event-list');
                    
                    if (events.length === 0) {
                        eventContainer.innerHTML = `
                            <div class="empty-state">
                                <div>📅</div>
                                <p>No events yet.</p>
                                <p style="font-size: 14px; margin-top: 10px;">Check out upcoming events on the dashboard!</p>
                            </div>
                        `;
                    } else {
                        const now = new Date();
                        const sortedEvents = events.sort((a, b) => new Date(a.date_time) - new Date(b.date_time));
                        
                        eventContainer.innerHTML = sortedEvents.map(event => {
                            const eventDate = new Date(event.date_time);
                            const isUpcoming = eventDate > now;
                            
                            return `
                                <div class="event-item" onclick="showEventDetails(${event.event_id})">
                                    <div class="event-date">
                                        <div class="event-day">${eventDate.getDate()}</div>
                                        <div class="event-month">${eventDate.toLocaleString('default', { month: 'short' })}</div>
                                    </div>
                                    <div class="event-details">
                                        <div class="event-title">${event.title}</div>
                                        <div class="event-organizer">${event.club_name || event.fest_name || 'Campus Event'}</div>
                                        <div class="event-venue">📍 ${event.venue || 'TBA'}</div>
                                    </div>
                                    <span class="event-status ${isUpcoming ? 'status-upcoming' : 'status-past'}">
                                        ${isUpcoming ? 'Upcoming' : 'Past'}
                                    </span>
                                </div>
                            `;
                        }).join('');
                    }
                }

                // Set member since date (from user creation)
                if (currentUser.created_at) {
                    const createdDate = new Date(currentUser.created_at);
                    document.getElementById('userMemberSince').textContent = createdDate.toLocaleDateString('en-US', { year: 'numeric', month: 'long' });
                } else {
                    document.getElementById('userMemberSince').textContent = '2024';
                }

            } catch (error) {
                console.error('Error loading profile:', error);
                showNotification('Failed to load profile data', 'error');
            }
        }

        // Helper function to get club icon
        function getClubIcon(clubName) {
            const name = clubName.toLowerCase();
            if (name.includes('coding') || name.includes('tech')) return '💻';
            if (name.includes('robotics')) return '🤖';
            if (name.includes('drama') || name.includes('theatre')) return '🎭';
            if (name.includes('music')) return '🎵';
            if (name.includes('photography')) return '📸';
            if (name.includes('sports')) return '⚽';
            if (name.includes('dance')) return '💃';
            if (name.includes('literary') || name.includes('debate')) return '📚';
            if (name.includes('environment')) return '🌱';
            return '🎯';
        }

        // Load profile on page load
        window.onload = loadProfile;
    </script>
</body>
</html>
