<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smart Campus</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
        }

        .login-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px 30px;
            text-align: center;
            color: white;
        }

        .logo {
            font-size: 48px;
            margin-bottom: 15px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .form-container {
            padding: 40px 30px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            font-size: 14px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 12px;
            color: #999;
            font-size: 16px;
            transition: color 0.3s;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            color: #999;
            cursor: pointer;
            font-size: 16px;
            user-select: none;
            transition: color 0.3s;
        }

        .toggle-password:hover {
            color: #667eea;
        }

        input {
            width: 100%;
            padding: 14px 14px 14px 45px;
            border: 2px solid #eef2f6;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s;
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        input.error {
            border-color: #ff4757;
        }

        input.error:focus {
            box-shadow: 0 0 0 3px rgba(255, 71, 87, 0.1);
        }

        .error-message {
            color: #ff4757;
            font-size: 12px;
            margin-top: 6px;
            display: none;
            padding-left: 12px;
        }

        .error-message.show {
            display: block;
        }

        .forgot-password {
            text-align: right;
            margin-bottom: 20px;
        }

        .forgot-password a {
            color: #667eea;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            transition: color 0.3s;
        }

        .forgot-password a:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-text {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .signup-link {
            text-align: center;
            margin-top: 25px;
            font-size: 14px;
            color: #666;
        }

        .signup-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            margin-left: 5px;
            transition: color 0.3s;
        }

        .signup-link a:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        .remember-me input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #667eea;
        }

        .remember-me label {
            margin-bottom: 0;
            cursor: pointer;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 12px;
            color: white;
            font-weight: 500;
            z-index: 1000;
            animation: slideIn 0.3s ease;
            max-width: 350px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .notification.success {
            background: #26de81;
        }

        .notification.error {
            background: #ff4757;
        }

        .notification.info {
            background: #667eea;
        }

        .demo-credentials {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

        .demo-credentials p {
            font-size: 13px;
            color: #666;
            margin-bottom: 8px;
        }

        .demo-credentials .cred {
            font-family: monospace;
            background: #eef2f6;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #999;
        }

        @media (max-width: 480px) {
            .header {
                padding: 30px 20px;
            }
            
            .form-container {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-card">
            <div class="header">
                <div class="logo">🎓</div>
                <h1>Welcome Back!</h1>
                <p>Sign in to continue to Smart Campus</p>
            </div>

            <div class="form-container">
                <form onsubmit="event.preventDefault(); handleLogin();" id="loginForm" autocomplete="on">
                    <!-- Email Field -->
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <div class="input-wrapper">
                            <span class="input-icon">📧</span>
                            <input 
                                type="email" 
                                id="email" 
                                placeholder="student@college.edu" 
                                required 
                                autocomplete="email"
                                value=""
                            >
                        </div>
                        <div class="error-message" id="emailError"></div>
                    </div>

                    <!-- Password Field -->
                    <div class="form-group">
                        <label for="pw">Password</label>
                        <div class="input-wrapper">
                            <span class="input-icon">🔒</span>
                            <input 
                                type="password" 
                                id="pw" 
                                placeholder="••••••••" 
                                required 
                                autocomplete="current-password"
                                value=""
                            >
                            <span class="toggle-password" onclick="togglePassword()">👁️</span>
                        </div>
                        <div class="error-message" id="passwordError"></div>
                    </div>

                    <!-- Remember Me & Forgot Password -->
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <div class="remember-me">
                            <input type="checkbox" id="remember">
                            <label for="remember">Remember me</label>
                        </div>
                        <div class="forgot-password">
                            <a href="#" onclick="showForgotPassword()">Forgot Password?</a>
                        </div>
                    </div>

                    <!-- Login Button -->
                    <button type="submit" class="btn" id="loginBtn">
                        <span class="btn-text">
                            <span>Sign In</span>
                        </span>
                    </button>

                    <!-- Demo Credentials (for testing) -->
                    <div class="demo-credentials">
                        <p>🔐 Demo Credentials:</p>
                        <span class="cred">Email: student@college.edu</span><br>
                        <span class="cred">Password: password123</span>
                    </div>
                </form>

                <!-- Signup Link -->
                <div class="signup-link">
                    Don't have an account? <a href="signup.html">Create Account</a>
                </div>
            </div>
        </div>

        <div class="footer">
            © 2024 Smart Campus Hub. All rights reserved.
        </div>
    </div>

    <script>
        // Configuration
        const API_BASE_URL = 'http://localhost:3000/api';
        
        // Check if user is already logged in
        if (localStorage.getItem('userId') && localStorage.getItem('token')) {
            // Redirect to dashboard if already logged in
            window.location.href = 'dashboard.html';
        }

        // Toggle password visibility
        function togglePassword() {
            const passwordInput = document.getElementById('pw');
            const toggleIcon = document.querySelector('.toggle-password');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.textContent = '🔒';
            } else {
                passwordInput.type = 'password';
                toggleIcon.textContent = '👁️';
            }
        }

        // Show notification
        function showNotification(message, type = 'info') {
            // Remove existing notification
            const existing = document.querySelector('.notification');
            if (existing) existing.remove();
            
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.textContent = message;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.remove();
            }, 5000);
        }

        // Set loading state
        function setLoading(isLoading) {
            const btn = document.getElementById('loginBtn');
            const btnText = btn.querySelector('.btn-text');
            
            if (isLoading) {
                btn.disabled = true;
                btnText.innerHTML = '<span class="loading"></span> Signing in...';
            } else {
                btn.disabled = false;
                btnText.innerHTML = '<span>Sign In</span>';
            }
        }

        // Validate email format
        function validateEmail(email) {
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(email);
        }

        // Clear errors
        function clearErrors() {
            document.querySelectorAll('.error-message').forEach(el => {
                el.classList.remove('show');
                el.textContent = '';
            });
            document.querySelectorAll('input').forEach(el => {
                el.classList.remove('error');
            });
        }

        // Show field error
        function showFieldError(fieldId, message) {
            const field = document.getElementById(fieldId);
            const errorEl = document.getElementById(`${fieldId}Error`);
            
            if (field) field.classList.add('error');
            if (errorEl) {
                errorEl.textContent = message;
                errorEl.classList.add('show');
            }
        }

        // Validate form
        function validateForm() {
            let isValid = true;
            clearErrors();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('pw').value;
            
            // Email validation
            if (!email) {
                showFieldError('email', 'Email is required');
                isValid = false;
            } else if (!validateEmail(email)) {
                showFieldError('email', 'Please enter a valid email address');
                isValid = false;
            }
            
            // Password validation
            if (!password) {
                showFieldError('pw', 'Password is required');
                isValid = false;
            } else if (password.length < 6) {
                showFieldError('pw', 'Password must be at least 6 characters');
                isValid = false;
            }
            
            return isValid;
        }

        // Handle login
        async function handleLogin() {
            // Validate form first
            if (!validateForm()) {
                return;
            }

            setLoading(true);

            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('pw').value;
            const remember = document.getElementById('remember').checked;

            try {
                const response = await fetch(`${API_BASE_URL}/login`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();
                console.log('Login response:', data); // Debug log

                if (response.ok && data.user) {
                    // Save user data
                    localStorage.setItem('token', data.token || 'dummy-token');
                    localStorage.setItem('userId', data.user.id);
                    localStorage.setItem('userName', data.user.name);
                    localStorage.setItem('userEmail', data.user.email);
                    
                    // Set remember me preference
                    if (remember) {
                        localStorage.setItem('remember', 'true');
                    }
                    
                    showNotification(`Welcome back, ${data.user.name}!`, 'success');
                    
                    // Redirect to dashboard after short delay
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1500);
                } else {
                    setLoading(false);
                    
                    // Handle specific error cases
                    if (response.status === 401) {
                        showFieldError('pw', 'Invalid email or password');
                        showNotification('Invalid email or password', 'error');
                    } else if (response.status === 404) {
                        showFieldError('email', 'User not found');
                        showNotification('User not found', 'error');
                    } else {
                        showNotification(data.error || 'Login failed', 'error');
                    }
                }
            } catch (error) {
                setLoading(false);
                console.error('Login error:', error);
                
                if (!navigator.onLine) {
                    showNotification('No internet connection. Please check your network.', 'error');
                } else {
                    showNotification('Server error. Please try again later.', 'error');
                }
            }
        }

        // Forgot password handler
        function showForgotPassword() {
            const email = document.getElementById('email').value.trim();
            
            if (email && validateEmail(email)) {
                showNotification(`Password reset link sent to ${email}`, 'info');
            } else {
                showNotification('Please enter your email address first', 'info');
                document.getElementById('email').focus();
            }
        }

        // Add enter key support
        document.addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                event.preventDefault();
                handleLogin();
            }
        });

        // Auto-focus email field on load
        window.onload = function() {
            document.getElementById('email').focus();
            
            // Check for saved email if remember me was checked
            if (localStorage.getItem('remember') === 'true') {
                // Could populate saved email here if you stored it
            }
        };

        // Real-time validation
        document.getElementById('email').addEventListener('input', function() {
            const errorEl = document.getElementById('emailError');
            if (this.classList.contains('error')) {
                this.classList.remove('error');
                errorEl.classList.remove('show');
            }
        });

        document.getElementById('pw').addEventListener('input', function() {
            const errorEl = document.getElementById('passwordError');
            if (this.classList.contains('error')) {
                this.classList.remove('error');
                errorEl.classList.remove('show');
            }
        });
    </script>
</body>
</html>
