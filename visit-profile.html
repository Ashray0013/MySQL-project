<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visit Profile - Smart Campus</title>
    <style>
        /* Keep all your existing styles - they're fine */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: auto;
        }

        /* Navigation */
        .navbar {
            background: white;
            border-radius: 15px;
            padding: 15px 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
        }

        .nav-links {
            display: flex;
            gap: 15px;
        }

        .nav-link {
            padding: 8px 20px;
            border-radius: 20px;
            text-decoration: none;
            color: #666;
            transition: 0.3s;
            font-weight: 500;
        }

        .nav-link:hover {
            background: #f0f2f5;
            color: #667eea;
        }

        .nav-link.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .logout-btn {
            background: #ff4757;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: 500;
        }

        .logout-btn:hover {
            background: #ff6b81;
            transform: translateY(-2px);
        }

        /* Back Button */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: white;
            text-decoration: none;
            font-weight: 500;
            margin-bottom: 20px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            backdrop-filter: blur(10px);
            transition: 0.3s;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateX(-5px);
        }

        /* Profile Card */
        .profile-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            overflow: hidden;
            margin-bottom: 25px;
        }

        .profile-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px;
            color: white;
            position: relative;
        }

        .profile-avatar {
            width: 120px;
            height: 120px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 56px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 20px;
            border: 4px solid rgba(255,255,255,0.3);
        }

        .profile-name {
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .profile-badge {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 14px;
            margin-right: 10px;
            backdrop-filter: blur(5px);
        }

        .profile-content {
            padding: 40px;
        }

        /* Bio Section */
        .bio-section {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            border-left: 4px solid #667eea;
        }

        .bio-section h3 {
            color: #2c3e50;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .bio-section p {
            line-height: 1.8;
            color: #555;
            font-size: 16px;
        }

        /* Info Grid */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .info-item {
            padding: 15px;
            background: #f8f9fa;
            border-radius: 12px;
            transition: 0.3s;
        }

        .info-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.1);
        }

        .info-label {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }

        .info-value {
            font-size: 18px;
            font-weight: 600;
            color: #2c3e50;
        }

        /* Social Links */
        .social-links {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .social-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 25px;
            background: #f0f2f5;
            border-radius: 30px;
            text-decoration: none;
            color: #333;
            transition: 0.3s;
            font-weight: 500;
        }

        .social-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .social-link.linkedin:hover {
            background: #0077b5;
            color: white;
        }

        .social-link.github:hover {
            background: #333;
            color: white;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 40px;
        }

        .stat-card {
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, #667eea10, #764ba210);
            border-radius: 12px;
            border: 1px solid #667eea20;
            transition: 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.15);
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 13px;
            color: #666;
            font-weight: 500;
        }

        /* Sections */
        .section {
            margin-top: 40px;
        }

        .section-title {
            font-size: 24px;
            color: #2c3e50;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f2f5;
        }

        /* Clubs Grid */
        .clubs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .club-card {
            background: linear-gradient(135deg, #667eea08, #764ba208);
            border: 1px solid #667eea20;
            padding: 25px 20px;
            border-radius: 15px;
            text-align: center;
            transition: 0.3s;
            cursor: pointer;
        }

        .club-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(102, 126, 234, 0.15);
            background: linear-gradient(135deg, #667eea15, #764ba215);
        }

        .club-icon {
            font-size: 40px;
            margin-bottom: 15px;
        }

        .club-name {
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 8px;
            font-size: 18px;
        }

        .club-position {
            font-size: 13px;
            color: #667eea;
            font-weight: 500;
            background: #e6f4ea;
            display: inline-block;
            padding: 4px 15px;
            border-radius: 20px;
        }

        /* Events Timeline */
        .events-timeline {
            position: relative;
        }

        .event-item {
            background: white;
            border: 1px solid #eef2f6;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: 0.3s;
            cursor: pointer;
        }

        .event-item:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.1);
            border-left: 4px solid #667eea;
        }

        .event-date {
            min-width: 90px;
            text-align: center;
            padding: 12px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-radius: 12px;
        }

        .event-day {
            font-size: 28px;
            font-weight: 700;
            line-height: 1;
        }

        .event-month {
            font-size: 13px;
            text-transform: uppercase;
            opacity: 0.9;
        }

        .event-details {
            flex: 1;
        }

        .event-title {
            font-size: 18px;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 5px;
        }

        .event-organizer {
            font-size: 14px;
            color: #667eea;
            font-weight: 500;
            margin-bottom: 5px;
        }

        .event-venue {
            font-size: 13px;
            color: #666;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .event-status {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-upcoming {
            background: #e6f4ea;
            color: #1e8e3e;
        }

        .status-past {
            background: #f1f3f4;
            color: #666;
        }

        /* Message Button */
        .message-btn {
            background: white;
            color: #667eea;
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 20px;
        }

        .message-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        /* Button Styles - ADD THESE */
        .button-primary {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
        }

        .button-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .button-secondary {
            display: inline-block;
            padding: 8px 20px;
            background: white;
            color: #667eea;
            border: 1px solid #667eea;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
        }

        .button-secondary:hover {
            background: #667eea;
            color: white;
        }

        .button-secondary.small {
            padding: 6px 16px;
            font-size: 13px;
        }

        /* Loading States */
        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Empty States */
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
            background: #f8f9fa;
            border-radius: 15px;
        }

        .empty-state i {
            font-size: 48px;
            margin-bottom: 10px;
            opacity: 0.3;
        }

        /* Error State */
        .error-state {
            text-align: center;
            padding: 60px;
            background: white;
            border-radius: 20px;
        }

        .error-state h2 {
            color: #2c3e50;
            margin-bottom: 15px;
        }

        .error-state p {
            color: #666;
            margin-bottom: 25px;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background-color: white;
            margin: 10% auto;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            position: relative;
            animation: slideIn 0.3s;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .close-modal {
            position: absolute;
            right: 25px;
            top: 20px;
            font-size: 28px;
            font-weight: bold;
            color: #999;
            cursor: pointer;
            transition: 0.3s;
        }

        .close-modal:hover {
            color: #333;
            transform: rotate(90deg);
        }

        .modal-title {
            color: #2c3e50;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f2f5;
        }

        /* Notifications */
        .success-message,
        .error-message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            z-index: 2000;
            animation: slideIn 0.3s;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .profile-header {
                padding: 30px;
            }

            .profile-name {
                font-size: 32px;
            }

            .profile-avatar {
                width: 100px;
                height: 100px;
                font-size: 48px;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .event-item {
                flex-direction: column;
                align-items: flex-start;
            }

            .event-date {
                width: 100%;
            }

            .navbar {
                flex-direction: column;
                gap: 15px;
            }
        }
    </style>

  <script>
    // JWT Fetch Interceptor
    const originalFetch = window.fetch;
    window.fetch = async (...args) => {
      const token = localStorage.getItem('token');
      if (token) {
        if (args.length === 1) {
          args.push({ headers: {} });
        } else {
          args[1] = args[1] || {};
          args[1].headers = args[1].headers || {};
        }
        
        // Handle headers object vs Headers instance
        if (args[1].headers instanceof Headers) {
          args[1].headers.append('Authorization', 'Bearer ' + token);
        } else {
          args[1].headers['Authorization'] = 'Bearer ' + token;
        }
      }
      return originalFetch(...args);
    };
  </script>
</head>
<body>
    <div class="container">
        <!-- Navigation -->
        <div class="navbar">
            <div class="logo" onclick="window.location.href='dashboard.html'">🎓 Smart Campus Hub</div>
            <div class="nav-links">
                <a href="dashboard.html" class="nav-link">Dashboard</a>
                <a href="profile.html" class="nav-link">My Profile</a>
            </div>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>

        <!-- Back Button -->
        <a href="javascript:history.back()" class="back-btn">
            ← Back
        </a>

        <!-- Profile Content -->
        <div id="profile-content">
            <!-- Profile will be loaded here -->
        </div>
    </div>

    <!-- Event Details Modal -->
    <div id="eventModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal('eventModal')">&times;</span>
            <h2 class="modal-title" id="modalEventTitle">Event Details</h2>
            <div id="modalEventContent" class="modal-body">
                Loading...
            </div>
        </div>
    </div>

    <script>
        // Configuration
        const API_BASE_URL = 'http://localhost:3000/api';
        const currentUserId = localStorage.getItem('userId');
        
        // Get visited user ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const visitedUserId = urlParams.get('id');

        // Check authentication
        if (!currentUserId) {
            window.location.href = 'login.html';
        }

        // Check if user ID is provided
        if (!visitedUserId) {
            document.getElementById('profile-content').innerHTML = `
                <div class="error-state">
                    <h2>❌ User Not Found</h2>
                    <p>No user ID provided.</p>
                    <a href="dashboard.html" class="button-primary">Go to Dashboard</a>
                </div>
            `;
        }

        // Modal functions
        function openModal(modalId) {
            document.getElementById(modalId).style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            if (event.target.classList.contains('modal')) {
                event.target.style.display = 'none';
                document.body.style.overflow = 'auto';
            }
        };

        // Show notification
        function showNotification(message, type = 'success') {
            const notification = document.createElement('div');
            notification.className = type === 'success' ? 'success-message' : 'error-message';
            notification.textContent = message;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.remove();
            }, 3000);
        }

        // Logout function
        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }

        // Get club icon
        function getClubIcon(clubName) {
            const name = clubName.toLowerCase();
            if (name.includes('coding') || name.includes('tech')) return '💻';
            if (name.includes('robotics')) return '🤖';
            if (name.includes('drama') || name.includes('theatre')) return '🎭';
            if (name.includes('music')) return '🎵';
            if (name.includes('photography')) return '📸';
            if (name.includes('sports')) return '⚽';
            if (name.includes('dance')) return '💃';
            if (name.includes('literary') || name.includes('debate')) return '📚';
            if (name.includes('environment')) return '🌱';
            return '🎯';
        }

        // Show event details
        async function showEventDetails(eventId) {
            try {
                const response = await fetch(`${API_BASE_URL}/events/${eventId}`);
                if (!response.ok) throw new Error('Failed to load event details');
                
                const event = await response.json();

                document.getElementById('modalEventTitle').textContent = event.title;

                const content = `
                    <div>
                        <p style="line-height: 1.6; margin-bottom: 20px;">${event.about_event || 'No description available.'}</p>
                        
                        <div style="background: #f8f9fa; padding: 15px; border-radius: 10px; margin-bottom: 20px;">
                            <div style="margin-bottom: 8px;"><strong>📅 Date:</strong> ${new Date(event.date_time).toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}</div>
                            <div style="margin-bottom: 8px;"><strong>⏰ Time:</strong> ${new Date(event.date_time).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' })}</div>
                            <div style="margin-bottom: 8px;"><strong>📍 Venue:</strong> ${event.venue || 'TBA'}</div>
                            <div><strong>🎪 Organized by:</strong> ${event.club_name || event.fest_name || 'Campus'}</div>
                        </div>
                    </div>
                `;

                document.getElementById('modalEventContent').innerHTML = content;
                openModal('eventModal');

            } catch (error) {
                console.error('Error loading event details:', error);
                showNotification('Failed to load event details', 'error');
            }
        }

        // Load visited user profile
        async function loadVisitedProfile() {
            try {
                // Show loading state
                document.getElementById('profile-content').innerHTML = `
                    <div class="loading">Loading profile...</div>
                `;

                // Fetch user profile using the dedicated visit-profile endpoint
                const response = await fetch(`${API_BASE_URL}/visit-profile/${visitedUserId}`);
                
                if (!response.ok) {
                    if (response.status === 404) {
                        document.getElementById('profile-content').innerHTML = `
                            <div class="error-state">
                                <h2>❌ User Not Found</h2>
                                <p>The user you're looking for doesn't exist.</p>
                                <a href="dashboard.html" class="button-primary">Go to Dashboard</a>
                            </div>
                        `;
                        return;
                    }
                    throw new Error('Failed to load profile');
                }

                const data = await response.json();
                console.log("Visit profile data:", data);

                // Extract data from the response
                const user = data;
                const memberships = data.clubs || [];
                const events = data.events || [];
                const stats = data.stats || {
                    club_count: memberships.length,
                    event_count: events.length,
                    upcoming_count: 0,
                    past_count: 0
                };

                // Calculate stats if not provided by API
                const now = new Date();
                const upcomingEvents = events.filter(e => new Date(e.date_time) > now).length;
                const pastEvents = events.filter(e => new Date(e.date_time) <= now).length;

                // Check if this is the current user's profile
                const isOwnProfile = (parseInt(currentUserId) === parseInt(visitedUserId));

                // Render profile
                const profileHTML = `
                    <div class="profile-card">
                        <div class="profile-header">
                            <div class="profile-avatar">
                                ${user.first_name ? user.first_name[0] : '?'}${user.last_name ? user.last_name[0] : ''}
                            </div>
                            <h1 class="profile-name">${user.first_name || ''} ${user.last_name || ''}</h1>
                            <div>
                                <span class="profile-badge">${user.roll_no || 'Roll No'}</span>
                                <span class="profile-badge">${user.branch_dept || 'Department'}</span>
                            </div>
                            ${!isOwnProfile ? `
                                <button class="message-btn" onclick="sendMessage(${user.user_id})">
                                    <span>💬</span> Send Message
                                </button>
                            ` : ''}
                        </div>

                        <div class="profile-content">
                            <!-- Bio Section -->
                            <div class="bio-section">
                                <h3><span>📝</span> About</h3>
                                <p>${user.bio || 'No bio provided.'}</p>
                            </div>

                            <!-- Stats Grid -->
                            <div class="stats-grid">
                                <div class="stat-card">
                                    <div class="stat-value">${stats.club_count || memberships.length}</div>
                                    <div class="stat-label">Clubs</div>
                                </div>
                                <div class="stat-card">
                                    <div class="stat-value">${stats.event_count || events.length}</div>
                                    <div class="stat-label">Total Events</div>
                                </div>
                                <div class="stat-card">
                                    <div class="stat-value">${stats.upcoming_count || upcomingEvents}</div>
                                    <div class="stat-label">Upcoming</div>
                                </div>
                                <div class="stat-card">
                                    <div class="stat-value">${stats.past_count || pastEvents}</div>
                                    <div class="stat-label">Past Events</div>
                                </div>
                            </div>

                            <!-- Contact Info Grid -->
                            <div class="info-grid">
                                <div class="info-item">
                                    <div class="info-label">Email</div>
                                    <div class="info-value">${user.email || 'Not available'}</div>
                                </div>
                                <div class="info-item">
                                    <div class="info-label">Member Since</div>
                                    <div class="info-value">${user.created_at ? new Date(user.created_at).getFullYear() : '2024'}</div>
                                </div>
                            </div>

                            <!-- Social Links -->
                            <div class="social-links">
                                ${user.linkedin_url ? `
                                    <a href="${user.linkedin_url}" target="_blank" class="social-link linkedin">
                                        <span>💼</span> LinkedIn
                                    </a>
                                ` : ''}
                                ${user.github_url ? `
                                    <a href="${user.github_url}" target="_blank" class="social-link github">
                                        <span>🐙</span> GitHub
                                    </a>
                                ` : ''}
                            </div>

                            <!-- Clubs Section -->
                            <div class="section">
                                <h2 class="section-title">
                                    <span>🎯</span> Club Memberships
                                </h2>
                                <div class="clubs-grid">
                                    ${memberships.length === 0 ? `
                                        <div class="empty-state" style="grid-column: 1/-1;">
                                            <div>🎯</div>
                                            <p>No club memberships yet.</p>
                                        </div>
                                    ` : memberships.map(membership => `
                                        <div class="club-card" onclick="window.location.href='club.html?id=${membership.club_id}'">
                                            <div class="club-icon">${getClubIcon(membership.cname)}</div>
                                            <div class="club-name">${membership.cname}</div>
                                            <div class="club-position">${membership.position || 'Member'}</div>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>

                            <!-- Events Section -->
                            <div class="section">
                                <h2 class="section-title">
                                    <span>📅</span> Events
                                </h2>
                                <div class="events-timeline">
                                    ${events.length === 0 ? `
                                        <div class="empty-state">
                                            <div>📅</div>
                                            <p>No events yet.</p>
                                        </div>
                                    ` : events.sort((a, b) => new Date(b.date_time) - new Date(a.date_time)).slice(0, 5).map(event => {
                                        const eventDate = new Date(event.date_time);
                                        const isUpcoming = eventDate > now;
                                        return `
                                            <div class="event-item" onclick="showEventDetails(${event.event_id})">
                                                <div class="event-date">
                                                    <div class="event-day">${eventDate.getDate()}</div>
                                                    <div class="event-month">${eventDate.toLocaleString('default', { month: 'short' })}</div>
                                                </div>
                                                <div class="event-details">
                                                    <div class="event-title">${event.title}</div>
                                                    <div class="event-organizer">${event.club_name || event.fest_name || 'Campus Event'}</div>
                                                    <div class="event-venue">📍 ${event.venue || 'TBA'}</div>
                                                </div>
                                                <span class="event-status ${isUpcoming ? 'status-upcoming' : 'status-past'}">
                                                    ${isUpcoming ? 'Upcoming' : 'Past'}
                                                </span>
                                            </div>
                                        `;
                                    }).join('')}
                                    ${events.length > 5 ? `
                                        <div style="text-align: center; margin-top: 20px;">
                                            <button class="button-secondary small" onclick="viewAllEvents(${visitedUserId})">
                                                View All Events
                                            </button>
                                        </div>
                                    ` : ''}
                                </div>
                            </div>
                        </div>
                    </div>
                `;

                document.getElementById('profile-content').innerHTML = profileHTML;

            } catch (error) {
                console.error('Error loading profile:', error);
                document.getElementById('profile-content').innerHTML = `
                    <div class="error-state">
                        <h2>❌ Error</h2>
                        <p>Failed to load profile. Please try again.</p>
                        <button class="button-primary" onclick="location.reload()">Retry</button>
                    </div>
                `;
            }
        }

        // Send message (placeholder - would need messaging system)
        function sendMessage(userId) {
            showNotification(`Messaging feature coming soon!`, 'info');
        }

        // View all events - Updated to show a more meaningful message
        function viewAllEvents(userId) {
            showNotification('View all events feature coming soon!', 'info');
            // You could also redirect to a page showing all events for this user
            // window.location.href = `user-events.html?id=${userId}`;
        }

        // Load profile on page load
        if (visitedUserId) {
            loadVisitedProfile();
        }
    </script>
</body>
</html>
